<html lang="en">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Solar System · VibeBuild</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif;color:#c9d1d9}
  canvas{display:block}
  .ui{position:fixed;top:12px;left:12px;font-size:13px;background:#161b22cc;border:1px solid #30363d;border-radius:8px;padding:10px 12px}
  .ui b{color:#58a6ff} label{display:block;margin-top:6px}
  .wm{position:fixed;bottom:10px;right:12px;color:#6e7681;font-size:12px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui"><b>🪐 Solar System</b><br>Keplerian orbits to scale-ish.
  <label>Speed <input id="sp" type="range" min="0" max="5" step="0.1" value="1"></label>
  <label><input id="tr" type="checkbox" checked> show trails</label></div>
<div class="wm">© VibeBuild (K.T.)</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H;function size(){W=c.width=innerWidth;H=c.height=innerHeight;}addEventListener('resize',size);size();
// name, orbit radius(px), period(rel), size, color
const P=[
 ['Mercury',60,0.24,3,'#b1b1b1'],['Venus',90,0.62,6,'#e6c07a'],['Earth',125,1,6.5,'#4d9be6'],
 ['Mars',160,1.88,4.5,'#e07a5f'],['Jupiter',230,11.9,15,'#d8b48c'],['Saturn',300,29.5,13,'#e3d6a3'],
 ['Uranus',360,84,9,'#9fe3e3'],['Neptune',415,165,9,'#5b6ee1']];
let t=0;const trails=P.map(()=>[]);
function frame(){
  const sp=+document.getElementById('sp').value, showTr=document.getElementById('tr').checked;
  x.fillStyle='rgba(0,0,0,0.4)';x.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  // stars
  // sun
  const sg=x.createRadialGradient(cx,cy,0,cx,cy,28);sg.addColorStop(0,'#fff7d6');sg.addColorStop(1,'#ff9b21');
  x.fillStyle=sg;x.beginPath();x.arc(cx,cy,22,0,7);x.fill();
  P.forEach((p,i)=>{
    const[name,r,per,sz,col]=p;
    x.strokeStyle='rgba(255,255,255,0.07)';x.beginPath();x.arc(cx,cy,r,0,7);x.stroke();
    const a=t/per; const px=cx+Math.cos(a)*r,py=cy+Math.sin(a)*r;
    if(showTr){const tr=trails[i];tr.push([px,py]);if(tr.length>120)tr.shift();
      x.strokeStyle=col+'66';x.lineWidth=1;x.beginPath();tr.forEach((q,k)=>k?x.lineTo(q[0],q[1]):x.moveTo(q[0],q[1]));x.stroke();}
    x.fillStyle=col;x.beginPath();x.arc(px,py,sz,0,7);x.fill();
    if(name==='Saturn'){x.strokeStyle='#e3d6a3aa';x.lineWidth=2;x.beginPath();x.ellipse(px,py,sz+7,sz*0.4+3,0.5,0,7);x.stroke();}
    x.fillStyle='#8b949e';x.font='10px system-ui';x.fillText(name,px+sz+2,py);
  });
  t+=0.01*sp;requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
